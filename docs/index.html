<!DOCTYPE html>
<html>
  <head>
    <title>Your Giga Pet</title>
    <meta name="description" content="A cool thing made with Glitch">
    <link id="favicon" rel="icon" href="https://glitch.com/edit/favicon-app.ico" type="image/x-icon">
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="style.css">
  </head>
  <body>
    <header>
      <h1>
        My Giga Pet Game
      </h1>
    </header>

    <main>
      <section class="pet-image-container">
        <img class="pet-image" src="images/hound happy.png" alt="Your Pet">
      </section>
      <section class="dashboard">
        <!-- REQUIREMENT #1: Display pet_info object properties -->
        <div>Name: <strong><span class="name"></span></strong></div>
        <div>Weight: <strong><span class="weight"></span> pounds</strong></div>
        <div>Happiness: <strong><span class="happiness"></span> tail wags (per min)</strong></div>
        
        <!-- REQUIREMENT #5: New behavior display below happiness text -->
        <div>Energy: <strong><span class="energy"></span>%</strong></div>
        
        <!-- REQUIREMENT #6: Visual notification (not console.log or alert) -->
        <div id="notification" class="notification hidden">
          <span id="notification-text"></span>
        </div>
        
        <div class="button-container">
          <!-- REQUIREMENT #2: Button behaviors -->
          <button class="treat-button">Treat</button>
          <button class="play-button">Play</button>
          <button class="exercise-button">Exercise</button>
          
          <!-- REQUIREMENT #4: New action button -->
          <button class="sleep-button">Sleep</button>
        </div>
      </section>
    </main>

    <!-- jQuery library -->
    <script src="https://code.jquery.com/jquery-2.2.1.min.js"
            integrity="sha256-gvQgAFzTH6trSrAWoH1iPo9Xc96QxSZ3feW6kem+O00="
            crossorigin="anonymous"></script>
    <script src="script.js" defer></script>
  </body>
</html>
